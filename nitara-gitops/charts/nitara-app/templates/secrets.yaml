# NOTE: In production use Sealed Secrets or Vault.
# These are placeholder base64 values — replace before applying.
apiVersion: v1
kind: Secret
metadata:
  name: nitara-db-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  username: {{ .Values.db.user    | b64enc }}
  password: {{ .Values.db.password | b64enc }}

---
apiVersion: v1
kind: Secret
metadata:
  name: nitara-minio-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  accessKey: {{ .Values.minio.accessKey | b64enc }}
  secretKey: {{ .Values.minio.secretKey | b64enc }}
