# ─────────────────────────────────────────────────────────────
#  Middleware ExternalName services — DEV / Test (Vmbr-30 MZ)
#
#  These let pods inside the DEV and Test clusters reach the
#  bare-metal MZ VMs using stable Kubernetes DNS names.
#
#  e.g.  mssql.nitara-dev.svc.cluster.local  → mssql-main.mz-dev.nitara.internal
#
#  Apply to BOTH namespaces:
#    kubectl apply -f middleware/mz-dev/services.yaml -n nitara-dev
#    kubectl apply -f middleware/mz-dev/services.yaml -n nitara-test
# ─────────────────────────────────────────────────────────────

# MS-SQL Server (Main) — CPU-4 MEM-12
apiVersion: v1
kind: Service
metadata:
  name: mssql
spec:
  type: ExternalName
  externalName: mssql-main.mz-dev.nitara.internal
  ports:
  - port: 1433

---
